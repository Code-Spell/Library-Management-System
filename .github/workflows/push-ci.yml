name: Submit to CodeSpell
on:
  push:
    branches:
      - main

jobs:
  submit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out Repository
        uses: actions/checkout@v4

      - name: Submit to CodeSpell
        uses: code-spell/codespell-submission-action@4db44fbae73a5e292251ab58e937df2a751bf9e0
        with:
          content-id: ${{ env.CODESPELL_CONTENT_ID }}
          language: JAVA
          user-id: ${{ secrets.CODESPELL_USER_ID }}
          auth-token: ${{ secrets.CODESPELL_AUTH_TOKEN }}
          api-url: https://api-dev.codespell.dev